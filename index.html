!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دكتور أحمد | المنصة الطبيه </title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;800&display=swap');

        :root {
            --medical-blue: #0ea5e9;
            --deep-navy: #020617;
            --glass-bg: rgba(15, 23, 42, 0.85);
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: var(--deep-navy);
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(14, 165, 233, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(124, 58, 237, 0.08) 0%, transparent 30%);
        }

        /* شبكة تكنولوجية خلفية */
        .tech-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* حاوية الصورة المتطورة */
        .medical-avatar-wrap {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto;
        }

        .pulse-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid var(--medical-blue);
            border-radius: 50%;
            opacity: 0;
            animation: pulse-border 3s infinite;
        }

        @keyframes pulse-border {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        .main-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1e293b;
            box-shadow: 0 0 50px rgba(14, 165, 233, 0.2);
            z-index: 5;
            position: relative;
        }

        /* لوحة التحكم الزجاجية */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #10b981;
        }

        .nav-link-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-link-card:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: var(--medical-blue);
            transform: scale(1.02);
        }

        /* زر الاتصال السريع */
        .emergency-btn {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.3);
            position: relative;
            overflow: hidden;
        }

        .emergency-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: sweep 4s infinite;
        }

        @keyframes sweep {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="tech-grid"></div>

    <div class="max-w-5xl w-full grid lg:grid-cols-2 gap-12 items-center">
        
        <!-- الجهة اليمنى: الهوية البصرية -->
        <div class="text-center lg:text-right space-y-6">
            <div class="medical-avatar-wrap">
                <div class="pulse-ring"></div>
                <div class="pulse-ring" style="animation-delay: 1.5s"></div>
                <img src="image.png" alt="دكتور أحمد" class="main-img">
            </div>
            
            <div class="space-y-4">
                <div class="status-badge">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    01145646515
                </div>
                <h1 class="text-5xl md:text-6xl font-extrabold text-white">د. أحمد <span class="text-sky-500">خالد</span></h1>

                </p>
            </div>
        </div>

        <!-- الجهة اليسرى: بوابة التواصل -->
        <div class="glass-panel p-8 md:p-12 space-y-6">
            <h2 class="text-xl font-bold text-sky-400 mb-8 flex items-center gap-3">
                <i data-lucide="activity" class="w-6 h-6"></i>
                بوابة التواصل الرقمية
            </h2>
            
            <div class="grid gap-4">
                <!-- واتساب -->
                <a href="https://wa.me/201145646515" target="_blank" class="nav-link-card p-5 rounded-3xl flex items-center gap-6 group">
                    <div class="w-14 h-14 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500 group-hover:scale-110 transition-transform">
                        <i data-lucide="message-circle" class="w-7 h-7"></i>
                    </div>
                    <div class="text-right flex-1">
                        <div class="text-white font-bold text-lg">استشارة واتساب</div>
                        <div class="text-slate-500 text-sm">تواصل مباشر وسريع</div>
                    </div>
                    <i data-lucide="arrow-left" class="w-5 h-5 text-slate-700 group-hover:text-sky-500 transition-colors"></i>
                </a>

                <!-- إنستجرام -->
                <a href="https://www.instagram.com/dr_ahmed__khaled?igsh=MTRiYzY4MzVxZHM0cA==" target="_blank" class="nav-link-card p-5 rounded-3xl flex items-center gap-6 group">
                    <div class="w-14 h-14 bg-pink-500/10 rounded-2xl flex items-center justify-center text-pink-500 group-hover:scale-110 transition-transform">
                        <i data-lucide="instagram" class="w-7 h-7"></i>
                    </div>
                    <div class="text-right flex-1">
                        <div class="text-white font-bold text-lg">المحتوى الطبي</div>
                        <div class="text-slate-500 text-sm">نصائح ومعلومات يومية</div>
                    </div>
                    <i data-lucide="arrow-left" class="w-5 h-5 text-slate-700 group-hover:text-sky-500 transition-colors"></i>
                </a>

                <!-- فيسبوك -->
                <a href="https://www.facebook.com/share/18EngTLqdj/" target="_blank" class="nav-link-card p-5 rounded-3xl flex items-center gap-6 group">
                    <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 group-hover:scale-110 transition-transform">
                        <i data-lucide="facebook" class="w-7 h-7"></i>
                    </div>
                    <div class="text-right flex-1">
                        <div class="text-white font-bold text-lg">المجتمع الطبي</div>
                        <div class="text-slate-500 text-sm">أحدث الأخبار والفعاليات</div>
                    </div>
                    <i data-lucide="arrow-left" class="w-5 h-5 text-slate-700 group-hover:text-sky-500 transition-colors"></i>
                </a>
            </div>

            <!-- زر الاتصال السريع -->
            <div class="pt-6">
                <a href="tel:01145646515" class="emergency-btn w-full py-6 rounded-3xl flex items-center justify-center gap-4 text-white font-extrabold text-xl transition-all transform hover:-translate-y-1 active:scale-95">
                    <i data-lucide="phone-forwarded" class="w-6 h-6 animate-pulse"></i>
                    حجز فوري
                </a>
            </div>

            <div class="flex justify-between items-center text-[10px] text-slate-600 font-bold uppercase tracking-widest pt-4">
                <span>International Hub ID: 114-564</span>
                <span class="flex items-center gap-1">Verified <i data-lucide="check-circle" class="w-3 h-3 text-sky-500"></i></span>
            </div>
        </div>
    </div>

    <script>
        // تهيئة الأيقونات
        lucide.createIcons();
    </script>
</body>
    </html>
