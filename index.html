<style>
    .countdown-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
    }
    .time-box {
        background: rgba(212, 175, 55, 0.1);
        border: 1px solid var(--gold);
        padding: 10px;
        border-radius: 8px;
        min-width: 60px;
        text-align: center;
    }
    .time-num {
        display: block;
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--gold);
    }
    .time-label {
        font-size: 0.7rem;
        color: #aaa;
    }
</style>

<body>

    <div class="header">
        <h1>عيد فطر مبارك</h1>
        <p>العد التنازلي لاستقبال العيد 🌙</p>
        
        <div class="countdown-container" id="countdown">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">يوم</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">ساعة</span></div>
            <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">دقيقة</span></div>
            <div class="time-box"><span class="time-num" id="seconds">00</span><span class="time-label">ثانية</span></div>
        </div>
    </div>

    <div class="card">
        <h3 style="color: var(--gold);">📝 مفكرة العيد | Ahmed AI</h3>
        <textarea id="noteInput" placeholder="اكتب هنا خططك للعيد أو ذكرياتك..."></textarea>
        <button class="btn-save" onclick="saveNote()">حفظ الملاحظة</button>
        <p id="status" style="font-size: 0.8rem; text-align: center; color: var(--gold); margin-top: 10px;"></p>
    </div>

    <script>
        // تحديد تاريخ العيد المتوقع (20 مارس 2026)
        const eidDate = new Date("March 20, 2026 00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = eidDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<h2 style='color:var(--gold)'>عيد سعيد! 🎉</h2>";
            }
        }, 1000);

        // تحميل وحفظ الملاحظات (نفس الكود السابق)
        window.onload = function() {
            const savedNote = localStorage.getItem('eid_note_2026');
            if (savedNote) document.getElementById('noteInput').value = savedNote;
        };

        function saveNote() {
            localStorage.setItem('eid_note_2026', document.getElementById('noteInput').value);
            document.getElementById('status').innerText = "تم الحفظ بنجاح! ✅";
            setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
        }
    </script>
</body>
